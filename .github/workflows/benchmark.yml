name: Benchmark

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Compare benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks on current commit
        run: |
          go test -run=xxx -bench=. -benchmem -benchtime=1s -count=5 \
            ./internal/crypto/ \
            ./internal/session/ \
            ./internal/transport/ \
            ./tg/ \
            ./tgerr/ \
            ./telegram/fileid/ \
            ./telegram/types/ \
            ./telegram/parser/ \
            2>&1 | tee new.txt

      - name: Compare with benchstat
        id: compare
        if: always()
        run: |
          if [ ! -f new.txt ]; then
            echo "Benchmark run did not complete — no results to compare." > bench_result.txt
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          benchstat bench_baseline.txt new.txt > bench_result.txt 2>&1 || true
          cat bench_result.txt

          # Check for regressions (>10% slower)
          if grep -E '\+[0-9]{2,}%|−[0-9]{2,}%' bench_result.txt | grep -v ' allocs'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Write job summary
        if: always()
        run: |
          {
            echo '## Benchmark Comparison'
            echo ''
            echo 'Comparing committed `bench_baseline.txt` → current commit'
            echo ''
            echo '> Baseline captured on AMD Ryzen 5 7600X. ns/op deltas reflect hardware differences with CI; **focus on B/op and allocs/op for regressions.**'
            echo ''
            echo '```'
            cat bench_result.txt 2>/dev/null || echo '(no benchmark result available)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true   # fork PRs: GITHUB_TOKEN can't write issue comments
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let result = '';
            try {
              result = fs.readFileSync('bench_result.txt', 'utf8');
            } catch (e) {
              result = 'Benchmark comparison failed: ' + e.message;
            }

            const hasChanges = '${{ steps.compare.outputs.has_changes }}' === 'true';
            const icon = hasChanges ? '⚠️' : '✅';
            const title = `${icon} Benchmark Comparison`;

            const body = [
              `<details><summary><b>${title}</b></summary>`,
              '',
              'Comparing committed `bench_baseline.txt` → current commit',
              '',
              '> Baseline from AMD Ryzen 5 7600X. Focus on **B/op and allocs/op**; ns/op varies by CI hardware.',
              '',
              '```',
              result,
              '```',
              '',
              '</details>',
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- benchmark-comment -->';
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: marker + '\n' + body,
              });
            }
