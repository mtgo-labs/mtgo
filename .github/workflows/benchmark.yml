name: Benchmark

"on":
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Compare benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks on PR branch
        run: |
          go test -run=xxx -bench=. -benchmem -benchtime=1s -count=5 \
            ./internal/crypto/ \
            ./internal/session/ \
            ./internal/transport/ \
            ./tg/ \
            ./tgerr/ \
            ./telegram/fileid/ \
            ./telegram/types/ \
            ./telegram/parser/ \
            2>&1 | tee new.txt

      - name: Checkout base branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.base_ref }}
          path: base
          clean: false

      - name: Copy go.mod from base
        run: |
          cp base/go.mod go.mod
          cp base/go.sum go.sum

      - name: Run benchmarks on base branch
        run: |
          # Copy base source files over the current checkout
          rsync -a --delete --exclude='.git' --exclude='base' --exclude='new.txt' base/ ./
          rm -rf base
          go test -run=xxx -bench=. -benchmem -benchtime=1s -count=5 \
            ./internal/crypto/ \
            ./internal/session/ \
            ./internal/transport/ \
            ./tg/ \
            ./tgerr/ \
            ./telegram/fileid/ \
            ./telegram/types/ \
            ./telegram/parser/ \
            2>&1 | tee old.txt

      - name: Compare with benchstat
        id: compare
        run: |
          benchstat old.txt new.txt > bench_result.txt 2>&1 || true
          cat bench_result.txt

          # Check for regressions (>10% slower)
          if grep -E '\+[0-9]{2,}%|−[0-9]{2,}%' bench_result.txt | grep -v ' allocs'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Post comment
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let result = '';
            try {
              result = fs.readFileSync('bench_result.txt', 'utf8');
            } catch (e) {
              result = 'Benchmark comparison failed: ' + e.message;
            }

            const hasChanges = '${{ steps.compare.outputs.has_changes }}' === 'true';
            const icon = hasChanges ? '⚠️' : '✅';
            const title = `${icon} Benchmark Comparison`;

            const body = [
              `<details><summary><b>${title}</b></summary>`,
              '',
              '```',
              result,
              '```',
              '',
              '</details>',
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- benchmark-comment -->';
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: marker + '\n' + body,
              });
            }
