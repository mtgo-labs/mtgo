name: Benchmark

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Compare benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need full history for worktree comparison

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Determine comparison ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base_ref=${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "base_ref=HEAD~1" >> $GITHUB_OUTPUT
          fi

      - name: Run benchmarks on current commit
        run: |
          go test -run=xxx -bench=. -benchmem -benchtime=1s -count=5 \
            ./internal/crypto/ \
            ./internal/session/ \
            ./internal/transport/ \
            ./tg/ \
            ./tgerr/ \
            ./telegram/fileid/ \
            ./telegram/types/ \
            ./telegram/parser/ \
            2>&1 | tee new.txt

      - name: Run benchmarks on base ref
        run: |
          BASE="${{ steps.ref.outputs.base_ref }}"
          git worktree add -q /tmp/base "$BASE"
          (
            cd /tmp/base
            go test -run=xxx -bench=. -benchmem -benchtime=1s -count=5 \
              ./internal/crypto/ \
              ./internal/session/ \
              ./internal/transport/ \
              ./tg/ \
              ./tgerr/ \
              ./telegram/fileid/ \
              ./telegram/types/ \
              ./telegram/parser/ \
              2>&1 | tee /tmp/base/old.txt
          )
          cp /tmp/base/old.txt old.txt
          git worktree remove --force /tmp/base

      - name: Compare with benchstat
        id: compare
        run: |
          benchstat old.txt new.txt > bench_result.txt 2>&1 || true
          cat bench_result.txt

          # Check for regressions (>10% slower)
          if grep -E '\+[0-9]{2,}%|−[0-9]{2,}%' bench_result.txt | grep -v ' allocs'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Write job summary
        if: always()
        run: |
          {
            echo '## Benchmark Comparison'
            echo ''
            echo "Comparing ${{ steps.ref.outputs.base_ref }} -> current commit"
            echo ''
            echo '```'
            cat bench_result.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let result = '';
            try {
              result = fs.readFileSync('bench_result.txt', 'utf8');
            } catch (e) {
              result = 'Benchmark comparison failed: ' + e.message;
            }

            const hasChanges = '${{ steps.compare.outputs.has_changes }}' === 'true';
            const icon = hasChanges ? '⚠️' : '✅';
            const title = `${icon} Benchmark Comparison`;

            const body = [
              `<details><summary><b>${title}</b></summary>`,
              '',
              '```',
              result,
              '```',
              '',
              '</details>',
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- benchmark-comment -->';
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: marker + '\n' + body,
              });
            }
