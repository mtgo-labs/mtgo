version: "2"

linters:
  disable:
    - errcheck
  enable:
    - staticcheck
    - unused
    - ineffassign
  settings:
    staticcheck:
      checks:
        - all
        - "-SA1019"
        - "-SA5011"
        - "-SA4010"
        - "-ST1000"
        - "-ST1021"

formatters:
  enable:
    - gofmt
